  name: nirmaan_youtube_player
  description: Cross-platform Flutter player for YouTube embeds and authorized offline video playback on Android, iOS, macOS, Windows, and web.
  version: 1.0.1

  homepage: https://github.com/Hemant88080/nirmaan_youtube_player
  repository: https://github.com/Hemant88080/nirmaan_youtube_player
  issue_tracker: https://github.com/Hemant88080/nirmaan_youtube_player/issues

  topics:
    - youtube
    - video-player
    - flutter
    - webview
    - offline-video

  environment:
    sdk: ">=3.0.0 <4.0.0"
    flutter: ">=3.16.0"

  platforms:
    android:
    ios:
    macos:
    web:
    windows:

  dependencies:
    flutter:
      sdk: flutter

    get: ^4.6.6
    get_storage: ^2.1.1
    flutter_inappwebview: ^6.1.5
    fullscreen_window: ^1.2.1
    dio: ^5.4.3+1
    youtube_explode_dart: ^3.1.0
    path_provider: ^2.1.3

  dev_dependencies:
    flutter_test:
      sdk: flutter
    flutter_lints: ^3.0.0
